services:
  api:
    build: ./backend
    container_name: xrp-certmail-api
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env

  web:
    build: ./frontend
    container_name: xrp-certmail-web
    restart: unless-stopped
    ports:
      - "3001:3000"
    depends_on:
      - api
